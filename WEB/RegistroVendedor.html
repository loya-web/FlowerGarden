<html>
    <head>
        <title>Registro</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="CSS/Registro2.css" rel="stylesheet" type="text/css"/>
    </head>
    <body>
        
        <main>
        <section>

            <p>Registro de Vendedor</p>
         
            <form action="JSP/RegistroVendedor.jsp">
                   
                <div class="campo">
                    <label for="nombre">Nombre:</label>
                    <input type="text" name="nombre" id="nombre" required><br>
                </div>
                
                <div class="campo">
                    <label for="ap">Apellido Paterno:</label>
                    <input type="text" name="ap" id="ap" required><br>
                </div>
                
                <div class="campo">
                    <label for="am">Apellido Materno:</label>
                    <input type="text" name="am" id="am" required><br>
                </div>
                
                <div class="campo">
                    <label for="correo">Correo:</label>
                    <input type="email" name="correo" id="correo" required><br>
                </div>
                
                <div class="campo">
                    <label for="toc">Teléfono o Celular:</label>
                    <input type="number" name="toc" id="toc" required><br>
                </div>
                    
                <div class="campo">
                    <label for="pwd">Contraseña:</label>
                    <input type="password" name="pwd" id="pwd" required><br>
                </div>

                <button type="submit">Registrate</button>
                
            </form>

        </section>
      </main>

        <footer>
            &COPY; Flower Garden - Gestión de plantas y jardinería
        </footer>

    </body>

</html>
