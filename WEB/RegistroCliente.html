<html>
    <head>
        <title>Registro</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="CSS/Registro2.css" rel="stylesheet" type="text/css"/>
    </head>
    <body>
        
        <main>
        <section>

            <p>Registro de Cliente</p>
         
            <form action="JSP/RegistroCliente.jsp">

                <label for="nombre">Nombre:</label>
                <input type="text" name="nombre" id="nombre" required><br>

                <label for="ap">Apellido Paterno:</label>
                <input type="text" name="ap" id="ap" required><br>

                <label for="am">Apellido Materno:</label>
                <input type="text" name="am" id="am" required><br>

                <label for="correo">Correo:</label>
                <input type="email" name="correo" id="correo" required><br>

                <label for="toc">Teléfono o Celular:</label>
                <input type="number" name="toc" id="toc" required><br>

                <label for="pwd">Contraseña:</label>
                <input type="password" name="pwd" id="pwd" required><br>
                
                <p>Dirección</p><br>
                
                <label for="est">Estado:</label>
                <input type="text" name="est" id="est" required><br>
                
                <label for="cd">Ciudad:</label>
                <input type="text" name="cd" id="cd" required><br>
                
                <label for="col">Colonia:</label>
                <input type="text" name="col" id="col" required><br>
                
                <label for="calle">Calle:</label>
                <input type="text" name="calle" id="calle" required><br>
                
                <label for="cp">Código Postal:</label>
                <input type="number" name="cp" id="cp" required><br>

                <button type="submit">Registrate</button>
                
                
            </form>

        </section>
      </main>

        <footer>
            &COPY; Flower Garden - Gestión de plantas y jardinería
        </footer>

    </body>

</html>
