<!DOCTYPE html>
<html>

<head>

    <title>Registro</title>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <link href="CSS/Registro2.css"
          rel="stylesheet"
          type="text/css"/>

</head>

<body>

<main>

<section>

    <p>Registro de Cliente</p>

    <form action="JSP/RegistroCliente.jsp">

        <div class="campo">

            <label for="nombre">
                Nombre:
            </label>

            <input type="text"
                   name="nombre"
                   id="nombre"
                   required>

        </div>

        <div class="campo">

            <label for="ap">
                Apellido Paterno:
            </label>

            <input type="text"
                   name="ap"
                   id="ap"
                   required>

        </div>

        <div class="campo">

            <label for="am">
                Apellido Materno:
            </label>

            <input type="text"
                   name="am"
                   id="am"
                   required>

        </div>

        <div class="campo">

            <label for="correo">
                Correo:
            </label>

            <input type="email"
                   name="correo"
                   id="correo"
                   required>

        </div>

        <div class="campo">

            <label for="toc">
                Teléfono o Celular:
            </label>

            <input type="number"
                   name="toc"
                   id="toc"
                   required>

        </div>

        <div class="campo">

            <label for="pwd">
                Contraseña:
            </label>

            <div class="password-container">

                <input type="password"
                       name="pwd"
                       id="pwd"
                       required
                       minlength="8"
                       pattern="^(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&.#_\-])[A-Za-z\d@$!%*?&.#_\-]{8,}$">

                <button type="button"
                        class="toggle-password"
                        onclick="mostrarPassword()">

                    👁

                </button>

            </div>

            <small>
                Mínimo 8 caracteres, una mayúscula,
                un número y un carácter especial.
            </small>

        </div>

        <p>Dirección</p>

        <div class="campo">

            <label for="est">
                Estado:
            </label>

            <input type="text"
                   name="est"
                   id="est"
                   required>

        </div>

        <div class="campo">

            <label for="cd">
                Ciudad:
            </label>

            <input type="text"
                   name="cd"
                   id="cd"
                   required>

        </div>

        <div class="campo">

            <label for="col">
                Colonia:
            </label>

            <input type="text"
                   name="col"
                   id="col"
                   required>

        </div>

        <div class="campo">

            <label for="calle">
                Calle:
            </label>

            <input type="text"
                   name="calle"
                   id="calle"
                   required>

        </div>

        <div class="campo">

            <label for="cp">
                Código Postal:
            </label>

            <input type="number"
                   name="cp"
                   id="cp"
                   required>

        </div>

        <button type="submit">

            Registrate

        </button>

    </form>

</section>

</main>

<footer>

    &COPY; Flower Garden - Gestión de plantas y jardinería

</footer>

<script>

function mostrarPassword(){

    const campo =
            document.getElementById("pwd");

    if(campo.type === "password"){

        campo.type = "text";

    }else{

        campo.type = "password";

    }
}

</script>

</body>

</html>
